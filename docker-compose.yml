services:
  vim:
    build:
      context: ./vim
    image: doguskysilva-vim
    stdin_open: true
    tty: true
    volumes:
      - ./content:/content

  dev:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000

volumes:
  node_modules:
